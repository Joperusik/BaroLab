components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    guideId:
      name: guideId
      in: path
      required: true
      schema:
        type: string 
        format: uuid
      description: Id of the Guide

    commentId:
      name: commentId
      in: path
      required: true
      schema:
        type: string 
        format: uuid
      description: Id of Comment

    postId:
      name: postId
      in: path
      required: true
      schema:
        type: string 
        format: uuid
      description: Id of Post

    userId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: ID of the User

    externalId:
      name: externalId
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: Steam Workshop external id

  schemas:
    Comment:
      type: object
      required:
        - id
        - post_id
        - user_id
        - author_username
        - body
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          example: 38ca31a9-a336-4087-ac97-d1ed40a2778e
          readOnly: true
        post_id:
          type: string
          format: uuid
          example: 38ca31a9-a336-4087-ac97-d1ed40a2778e
          readOnly: true
        user_id:
          type: string
          format: uuid
          example: 38ca31a9-a336-4087-ac97-d1ed40a2778e
          readOnly: true
        author_username:
          type: string
          readOnly: true
        body:
          type: string
          example: Something cool maybe
        status:
          type: string 
          enum: [ ACTIVE, BLOCKED ]
          example: ACTIVE
          readOnly: true
        created_at:
          type: string
          format: date-time
          example: 2021-09-20T12:00:00Z
          readOnly: true
        updated_at:
          type: string
          format: date-time
          example: 2021-09-20T13:41:22Z
          readOnly: true

    CreateCommentRequest:
      type: object
      required:
        - body
      properties:
        body:
          type: string
          example: Something cool maybe

    Post:
      type: object
      required:
        - id
        - user_id
        - author_username
        - rating
        - status
        - title
        - content
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          example: 38ca31a9-a336-4087-ac97-d1ed40a2778e
          readOnly: true
        user_id:
          type: string
          format: uuid
          example: 38ca31a9-a336-4087-ac97-d1ed40a2778e
          readOnly: true
        author_username:
          type: string
          readOnly: true
        rating:
          type: integer
          example: 0
          readOnly: true
        my_vote:
          type: integer
          enum: [ -1, 1 ]
          example: 1
          readOnly: true
        status:
          type: string 
          enum: [ ACTIVE, BLOCKED ]
          example: ACTIVE
          readOnly: true
        title:
          type: string
          example: Post name
        content:
          type: string 
          example: content
        created_at:
          type: string
          format: date-time
          example: 2021-09-20T12:00:00Z
          readOnly: true
        updated_at:
          type: string
          format: date-time
          example: 2021-09-20T13:41:22Z
          readOnly: true

    CreatePostRequest:
      type: object
      required:
        - title
        - content
      properties:
        title:
          type: string
          example: Post name
        content:
          type: string
          example: content

    ModPost:
      type: object
      required:
        - id
        - user_id
        - author_username
        - rating
        - status
        - title
        - content
        - created_at
        - updated_at
        - external_id
        - popularity
      properties:
        id:
          type: string
          format: uuid
          example: 38ca31a9-a336-4087-ac97-d1ed40a2778e
          readOnly: true
        user_id:
          type: string
          format: uuid
          example: 38ca31a9-a336-4087-ac97-d1ed40a2778e
          readOnly: true
        author_username:
          type: string
          readOnly: true
        rating:
          type: integer
          example: 0
          readOnly: true
        my_vote:
          type: integer
          enum: [ -1, 1 ]
          example: 1
          readOnly: true
        status:
          type: string
          enum: [ ACTIVE, BLOCKED ]
          example: ACTIVE
          readOnly: true
        title:
          type: string
          example: Mod name
        content:
          type: string
          example: content
        created_at:
          type: string
          format: date-time
          example: 2021-09-20T12:00:00Z
          readOnly: true
        updated_at:
          type: string
          format: date-time
          example: 2021-09-20T13:41:22Z
          readOnly: true
        external_id:
          type: integer
          format: int64
          example: 3520553488
          readOnly: true
        popularity:
          type: integer
          example: 0
          readOnly: true

    CreateModPostRequest:
      type: object
      required:
        - title
        - content
        - external_url
      properties:
        title:
          type: string
          example: Mod name
        content:
          type: string
          example: content
        external_url:
          type: string
          example: https://steamcommunity.com/sharedfiles/filedetails/?id=3520553488

    User:
      type: object
      required:
        - id
        - login
        - email
        - username
        - status
        - role
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          example: 38ca31a9-a336-4087-ac97-d1ed40a2778e
          readOnly: true
        login:
          type: string
          example: login
        email:
          type: string
          format: email
          example: test@gmail.com
        username:
          type: string
        status:
          type: string
          enum: [ ACTIVE, BLOCKED ]
          example: ACTIVE
          readOnly: true
        role:
          type: string
          enum: [ USER, SUPERUSER, ADMIN, SUPER_ADMIN ]
          example: USER
        created_at:
          type: string
          format: date-time
          example: 2021-09-20T12:00:00Z
          readOnly: true
        updated_at:
          type: string
          format: date-time
          example: 2021-09-20T13:41:22Z
          readOnly: true

    TokenResponse:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: JWT token.
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6Ik

    LoginRequest:
      type: object
      required:
        - login
        - password
      properties:
        login:
          type: string
          example: login
        password:
          type: string
          format: password
          example: qwerty123456

    SignUpRequest:
      type: object
      required:
        - login
        - email
        - username
        - password
      properties:
        login:
          type: string
          example: login
        email:
          type: string
          format: email
          example: user@example.com
        username:
          type: string
        password:
          type: string
          format: password
          example: qwerty123456
          writeOnly: true
    ModGuide:
      type: object
      required:
        - id
        - modId
        - title
        - content
        - author
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        modId:
          type: integer
          format: int64
          readOnly: true
        title:
          type: string
        content:
          type: string
        author:
          $ref: '#/components/schemas/User'
          readOnly: true
        status:
          type: string 
          enum: [ ACTIVE, BLOCKED ]
          example: ACTIVE
          readOnly: true
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    CreateModGuideRequest:
      type: object
      required:
        - title
        - content
      properties:
        title:
          type: string
          minLength: 3
        content:
          type: string

    Error:
      type: object
      properties:
        message:
          type: string
          example: Error message.
